<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- glowing rings behind avatar -->
  <circle cx="200" cy="100" r="80" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="24"/>
  <circle cx="200" cy="100" r="58" fill="none" stroke="rgba(139,92,246,0.18)" stroke-width="16"/>
  <!-- avatar background -->
  <circle cx="200" cy="95" r="42" fill="rgba(139,92,246,0.3)" stroke="rgba(167,139,250,0.6)" stroke-width="2"/>
  <!-- person head -->
  <circle cx="200" cy="82" r="17" fill="rgba(255,255,255,0.8)"/>
  <!-- person body -->
  <path d="M172,115 Q172,100 200,100 Q228,100 228,115" fill="rgba(255,255,255,0.8)"/>
  <!-- name bar -->
  <rect x="156" y="152" width="88" height="11" rx="5.5" fill="rgba(255,255,255,0.6)"/>
  <!-- role tag -->
  <rect x="170" y="170" width="60" height="9" rx="4" fill="rgba(139,92,246,0.55)"/>
  <!-- bottom info row -->
  <rect x="120" y="196" width="36" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="164" y="196" width="36" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="208" y="196" width="36" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="252" y="196" width="28" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
</svg>
