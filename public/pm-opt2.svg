<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- Gantt chart frame -->
  <rect x="40" y="40" width="320" height="160" rx="12" fill="rgba(0,0,0,0.3)"/>
  <!-- header row -->
  <rect x="40" y="40" width="320" height="30" rx="12" fill="rgba(255,255,255,0.12)"/>
  <rect x="40" y="58" width="320" height="12" fill="rgba(255,255,255,0.12)"/>
  <!-- month labels -->
  <text x="100" y="60" font-size="9" fill="rgba(255,255,255,0.5)" font-family="sans-serif" text-anchor="middle">Jan</text>
  <text x="160" y="60" font-size="9" fill="rgba(255,255,255,0.5)" font-family="sans-serif" text-anchor="middle">Feb</text>
  <text x="220" y="60" font-size="9" fill="rgba(255,255,255,0.5)" font-family="sans-serif" text-anchor="middle">Mar</text>
  <text x="280" y="60" font-size="9" fill="rgba(255,255,255,0.5)" font-family="sans-serif" text-anchor="middle">Apr</text>
  <text x="340" y="60" font-size="9" fill="rgba(255,255,255,0.5)" font-family="sans-serif" text-anchor="middle">May</text>
  <!-- vertical grid lines -->
  <line x1="130" y1="70" x2="130" y2="200" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="190" y1="70" x2="190" y2="200" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="250" y1="70" x2="250" y2="200" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="310" y1="70" x2="310" y2="200" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Gantt bars -->
  <!-- row 1: long green bar -->
  <rect x="80" y="76" width="120" height="16" rx="8" fill="rgba(52,211,153,0.85)"/>
  <rect x="48" y="79" width="28" height="10" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- row 2: medium orange -->
  <rect x="130" y="100" width="100" height="16" rx="8" fill="rgba(251,146,60,0.85)"/>
  <rect x="48" y="103" width="36" height="10" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- row 3: shorter blue -->
  <rect x="190" y="124" width="80" height="16" rx="8" fill="rgba(96,165,250,0.85)"/>
  <rect x="48" y="127" width="30" height="10" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- row 4: yellow, partial done -->
  <rect x="240" y="148" width="110" height="16" rx="8" fill="rgba(255,255,255,0.12)"/>
  <rect x="240" y="148" width="55" height="16" rx="8" fill="rgba(251,191,36,0.8)"/>
  <rect x="48" y="151" width="44" height="10" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- row 5: pink -->
  <rect x="160" y="172" width="140" height="16" rx="8" fill="rgba(244,114,182,0.75)"/>
  <rect x="48" y="175" width="34" height="10" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- today line -->
  <line x1="220" y1="70" x2="220" y2="200" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="220" cy="70" r="4" fill="white"/>
</svg>
