<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <clipPath id="circ">
      <circle cx="200" cy="88" r="44"/>
    </clipPath>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- subtle dots background pattern -->
  <circle cx="40" cy="40" r="2" fill="rgba(255,255,255,0.08)"/>
  <circle cx="100" cy="20" r="2" fill="rgba(255,255,255,0.08)"/>
  <circle cx="300" cy="30" r="2" fill="rgba(255,255,255,0.08)"/>
  <circle cx="360" cy="50" r="2" fill="rgba(255,255,255,0.08)"/>
  <circle cx="50" cy="200" r="2" fill="rgba(255,255,255,0.06)"/>
  <circle cx="350" cy="210" r="2" fill="rgba(255,255,255,0.06)"/>
  <!-- avatar ring -->
  <circle cx="200" cy="88" r="50" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- person head -->
  <circle cx="200" cy="76" r="20" fill="rgba(255,255,255,0.7)"/>
  <!-- person shoulders -->
  <ellipse cx="200" cy="118" rx="28" ry="18" fill="rgba(255,255,255,0.7)"/>
  <!-- clip so shoulders don't go outside circle -->
  <circle cx="200" cy="88" r="44" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- name line -->
  <rect x="150" y="150" width="100" height="11" rx="5" fill="rgba(255,255,255,0.6)"/>
  <!-- role line -->
  <rect x="168" y="168" width="64" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <!-- info dots -->
  <circle cx="172" cy="194" r="4" fill="rgba(255,255,255,0.4)"/>
  <circle cx="188" cy="194" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="204" cy="194" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="220" cy="194" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="236" cy="194" r="4" fill="rgba(255,255,255,0.15)"/>
</svg>
