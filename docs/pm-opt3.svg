<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- node network / workflow -->
  <!-- center node -->
  <circle cx="200" cy="120" r="26" fill="rgba(255,140,0,0.25)" stroke="#ff8c00" stroke-width="2" filter="url(#glow)"/>
  <circle cx="200" cy="120" r="14" fill="#ff8c00" opacity="0.9"/>
  <!-- top-left node -->
  <circle cx="80" cy="60" r="18" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.7)" stroke-width="1.5"/>
  <circle cx="80" cy="60" r="9" fill="rgba(96,165,250,0.8)"/>
  <!-- top-right node -->
  <circle cx="320" cy="60" r="18" fill="rgba(52,211,153,0.2)" stroke="rgba(52,211,153,0.7)" stroke-width="1.5"/>
  <circle cx="320" cy="60" r="9" fill="rgba(52,211,153,0.8)"/>
  <!-- bottom-left node -->
  <circle cx="80" cy="180" r="18" fill="rgba(244,114,182,0.2)" stroke="rgba(244,114,182,0.7)" stroke-width="1.5"/>
  <circle cx="80" cy="180" r="9" fill="rgba(244,114,182,0.8)"/>
  <!-- bottom-right node -->
  <circle cx="320" cy="180" r="18" fill="rgba(251,191,36,0.2)" stroke="rgba(251,191,36,0.7)" stroke-width="1.5"/>
  <circle cx="320" cy="180" r="9" fill="rgba(251,191,36,0.8)"/>
  <!-- right node -->
  <circle cx="360" cy="120" r="14" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/>
  <circle cx="360" cy="120" r="7" fill="rgba(167,139,250,0.8)"/>
  <!-- connecting lines -->
  <line x1="95" y1="70" x2="186" y2="110" stroke="rgba(96,165,250,0.4)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="305" y1="70" x2="214" y2="110" stroke="rgba(52,211,153,0.4)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="95" y1="170" x2="186" y2="130" stroke="rgba(244,114,182,0.4)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="305" y1="170" x2="214" y2="130" stroke="rgba(251,191,36,0.4)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="226" y1="120" x2="346" y2="120" stroke="rgba(167,139,250,0.4)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- labels -->
  <rect x="55" y="84" width="50" height="10" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="295" y="84" width="50" height="10" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="55" y="196" width="50" height="10" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="295" y="196" width="50" height="10" rx="3" fill="rgba(255,255,255,0.12)"/>
</svg>
