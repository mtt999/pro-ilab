<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a192f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- large faint circle top right -->
  <circle cx="340" cy="30" r="100" fill="none" stroke="rgba(56,189,248,0.1)" stroke-width="30"/>
  <!-- horizontal split layout: left = avatar, right = info -->
  <!-- left side avatar -->
  <circle cx="130" cy="120" r="56" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.4)" stroke-width="2"/>
  <circle cx="130" cy="107" r="22" fill="rgba(255,255,255,0.7)"/>
  <path d="M97,148 Q97,130 130,130 Q163,130 163,148" fill="rgba(255,255,255,0.7)"/>
  <!-- right side info lines -->
  <rect x="206" y="80" width="110" height="13" rx="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="206" y="100" width="76" height="9" rx="4" fill="rgba(56,189,248,0.55)"/>
  <line x1="206" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="206" y="130" width="50" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="264" y="130" width="50" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="206" y="146" width="36" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="206" y="162" width="96" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- stat pills -->
  <rect x="206" y="180" width="44" height="16" rx="8" fill="rgba(56,189,248,0.25)" stroke="rgba(56,189,248,0.4)" stroke-width="1"/>
  <rect x="256" y="180" width="44" height="16" rx="8" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
</svg>
