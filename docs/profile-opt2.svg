<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- large decorative arc top-right -->
  <circle cx="360" cy="-20" r="160" fill="none" stroke="rgba(139,92,246,0.18)" stroke-width="40"/>
  <!-- ID card -->
  <rect x="60" y="30" width="280" height="180" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
  <!-- card header band -->
  <rect x="60" y="30" width="280" height="52" rx="16" fill="rgba(139,92,246,0.35)"/>
  <rect x="60" y="64" width="280" height="18" fill="rgba(139,92,246,0.35)"/>
  <!-- avatar circle on card -->
  <circle cx="110" cy="130" r="36" fill="rgba(139,92,246,0.25)" stroke="rgba(139,92,246,0.6)" stroke-width="2"/>
  <circle cx="110" cy="120" r="14" fill="rgba(255,255,255,0.55)"/>
  <ellipse cx="110" cy="150" rx="20" ry="13" fill="rgba(255,255,255,0.55)"/>
  <!-- info lines right of avatar -->
  <rect x="162" y="104" width="120" height="11" rx="5" fill="rgba(255,255,255,0.55)"/>
  <rect x="162" y="122" width="80" height="8" rx="4" fill="rgba(139,92,246,0.6)"/>
  <rect x="162" y="138" width="100" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="162" y="152" width="70" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- card title -->
  <text x="200" y="62" font-size="11" font-weight="700" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="sans-serif" letter-spacing="2">MEMBER PROFILE</text>
  <!-- bottom strip -->
  <rect x="76" y="188" width="268" height="10" rx="5" fill="rgba(255,255,255,0.07)"/>
  <rect x="76" y="188" width="80" height="10" rx="5" fill="rgba(139,92,246,0.4)"/>
</svg>
