<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#134e5e"/>
      <stop offset="100%" stop-color="#71b280"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- subtle hexagon pattern -->
  <polygon points="60,20 80,8 100,20 100,44 80,56 60,44" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <polygon points="100,20 120,8 140,20 140,44 120,56 100,44" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <polygon points="300,196 320,184 340,196 340,220 320,232 300,220" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <polygon points="340,196 360,184 380,196 380,220 360,232 340,220" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- frosted card -->
  <rect x="80" y="44" width="240" height="152" rx="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- avatar circle -->
  <circle cx="200" cy="110" r="44" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- person icon -->
  <circle cx="200" cy="97" r="17" fill="rgba(255,255,255,0.85)"/>
  <path d="M173,130 Q173,116 200,116 Q227,116 227,130" fill="rgba(255,255,255,0.85)"/>
  <!-- name -->
  <rect x="158" y="165" width="84" height="10" rx="5" fill="rgba(255,255,255,0.65)"/>
  <!-- bottom tag pill -->
  <rect x="172" y="182" width="56" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
</svg>
