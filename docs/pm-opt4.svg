<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f7931e"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.3)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- large progress ring left -->
  <circle cx="130" cy="120" r="70" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="12"/>
  <circle cx="130" cy="120" r="70" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="12"
    stroke-dasharray="308" stroke-dashoffset="77"
    stroke-linecap="round" transform="rotate(-90 130 120)"/>
  <text x="130" y="116" font-size="22" font-weight="700" fill="white" text-anchor="middle" font-family="sans-serif">75%</text>
  <text x="130" y="132" font-size="9" fill="rgba(255,255,255,0.75)" text-anchor="middle" font-family="sans-serif">COMPLETE</text>
  <!-- small ring top right -->
  <circle cx="290" cy="75" r="36" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="8"/>
  <circle cx="290" cy="75" r="36" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="8"
    stroke-dasharray="226" stroke-dashoffset="113"
    stroke-linecap="round" transform="rotate(-90 290 75)"/>
  <text x="290" y="79" font-size="12" font-weight="700" fill="white" text-anchor="middle" font-family="sans-serif">50%</text>
  <!-- small ring bottom right -->
  <circle cx="310" cy="168" r="30" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="7"/>
  <circle cx="310" cy="168" r="30" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="7"
    stroke-dasharray="188" stroke-dashoffset="47"
    stroke-linecap="round" transform="rotate(-90 310 168)"/>
  <text x="310" y="172" font-size="11" font-weight="700" fill="white" text-anchor="middle" font-family="sans-serif">75%</text>
  <!-- labels -->
  <rect x="234" y="116" width="60" height="8" rx="3" fill="rgba(255,255,255,0.25)"/>
  <rect x="234" y="130" width="44" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
</svg>
